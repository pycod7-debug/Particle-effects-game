<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stickman Z - Battle Fixed</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; touch-action: none; color: #fff; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        #menu { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .c-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .c-btn { padding: 12px; border: 1px solid #444; background: #111; color: #fff; cursor: pointer; text-align: center; font-size: 12px; }
        .c-btn.active { border-color: #00f2ff; background: #003344; }
        #start-btn { padding: 15px 50px; background: #00f2ff; color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }

        #hud { position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-around; z-index: 10; pointer-events: none; }
        .bar { width: 140px; height: 10px; background: #333; border: 1px solid #fff; overflow: hidden; margin-bottom: 5px; }
        .fill-hp { width: 100%; height: 100%; background: #ff0000; transition: 0.2s; }
        .fill-ki { width: 0%; height: 100%; background: #00f2ff; }
        .hidden { display: none !important; }

        #controls { position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 50; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.1); border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; user-select: none; font-size: 10px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color:#00f2ff">ANIME SUPREME</h1>
        <div class="c-grid" id="char-selection">
            <div class="c-btn active" onclick="pick('Goku')">GOKU</div>
            <div class="c-btn" onclick="pick('Vegeta')">VEGETA</div>
            <div class="c-btn" onclick="pick('Broly')">BROLY</div>
            <div class="c-btn" onclick="pick('Gojo')">GOJO</div>
            <div class="c-btn" onclick="pick('Frieza')">FRIEZA</div>
        </div>
        <button id="start-btn">FIGHT</button>
    </div>

    <div id="hud" class="hidden">
        <div>PLAYER<div class="bar"><div id="p-hp" class="fill-hp"></div></div><div class="bar"><div id="p-ki" class="fill-ki"></div></div></div>
        <div style="text-align:right">ENEMY<div class="bar"><div id="e-hp" class="fill-hp"></div></div></div>
    </div>

    <div id="controls" class="hidden">
        <div style="display:flex; gap:10px;">
            <div class="btn" id="ctrl-left">←</div>
            <div class="btn" id="ctrl-up">↑</div>
            <div class="btn" id="ctrl-right">→</div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div class="btn" id="ctrl-punch">PUNCH</div>
            <div class="btn" id="ctrl-charge">KI</div>
            <div class="btn" id="ctrl-burst">BURST</div>
            <div class="btn" id="ctrl-ult">ULT</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let isPlaying = false;

        const actors = {
            p: { x:200, y:0, vx:0, vy:0, hp:100, ki:0, form:0, face:1, state:'idle', name:'Goku' },
            e: { x:600, y:0, vx:0, vy:0, hp:100, ki:0, form:1, face:-1, state:'idle', name:'Broly' }
        };

        const config = {
            'Goku': { aura:'#00f2ff', hair:'#fff', forms:['SSJ','SSB','UI'] },
            'Vegeta': { aura:'#00f2ff', hair:'#fff', forms:['SSJ','SSB','EGO'] },
            'Broly': { aura:'#4ade80', hair:'#4ade80', size:1.2 },
            'Gojo': { aura:'#a855f7', hair:'#fff', special:true },
            'Frieza': { aura:'#ff00ff', hair:'#fff', skin:'#ffee00' }
        };

        const inputs = { left:false, right:false, up:false, charge:false, ult:false };

        function pick(name) {
            actors.p.name = name;
            document.querySelectorAll('.c-btn').forEach(b => b.classList.toggle('active', b.innerText === name.toUpperCase()));
        }

        // --- FIXED BUTTON LOGIC ---
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            isPlaying = true;
            resize();
        });

        function bind(id, key) {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); inputs[key] = true; }, {passive:false});
            el.addEventListener('touchend', (e) => { e.preventDefault(); inputs[key] = false; }, {passive:false});
            el.addEventListener('mousedown', () => inputs[key] = true);
            el.addEventListener('mouseup', () => inputs[key] = false);
        }

        bind('ctrl-left', 'left'); bind('ctrl-right', 'right'); bind('ctrl-up', 'up');
        bind('ctrl-charge', 'charge'); bind('ctrl-ult', 'ult');

        document.getElementById('ctrl-punch').onclick = () => {
            actors.p.state = 'attack';
            if (Math.abs(actors.p.x - actors.e.x) < 80) actors.e.hp -= 5;
            setTimeout(() => actors.p.state = 'idle', 150);
        };

        document.getElementById('ctrl-burst').onclick = () => {
            if (actors.p.ki >= 100) { actors.p.form++; actors.p.ki = 0; }
        };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            actors.p.y = canvas.height - 150;
            actors.e.y = canvas.height - 150;
        }
        window.addEventListener('resize', resize);

        function drawStick(actor) {
            const {x, y, face, state, name, form} = actor;
            const char = config[name];
            const size = char.size || 1;
            
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(size * face, size);

            // Aura
            if (state === 'charge' || form > 0) {
                ctx.strokeStyle = char.aura;
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, -40, 45 + Math.random()*10, 0, Math.PI*2); ctx.stroke();
            }

            // Body Lines
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 5;
            ctx.lineCap = "round";

            // Head & Hair
            ctx.beginPath(); ctx.arc(0, -65, 12, 0, Math.PI*2); ctx.stroke();
            if (form > 0 || name === 'Gojo') {
                ctx.fillStyle = char.hair;
                ctx.beginPath();
                ctx.moveTo(-12, -72); ctx.lineTo(0, -90); ctx.lineTo(12, -72);
                ctx.fill();
            }

            // Spine
            ctx.beginPath(); ctx.moveTo(0, -53); ctx.lineTo(0, -20); ctx.stroke();
            
            // Legs
            const walk = isPlaying ? Math.sin(Date.now()*0.01)*10 : 0;
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-15 + walk, 10);
            ctx.moveTo(0, -20); ctx.lineTo(15 - walk, 10); ctx.stroke();

            // Arms
            if (state === 'attack') {
                ctx.beginPath(); ctx.moveTo(0, -45); ctx.lineTo(40, -45); ctx.stroke();
            } else if (state === 'ult') {
                ctx.beginPath(); ctx.moveTo(0, -45); ctx.lineTo(30, -35); ctx.stroke();
                // Ult Beam
                ctx.fillStyle = char.aura;
                ctx.fillRect(25, -50, 1000, 30);
                if (Math.abs(actors.p.x - actors.e.x) < 1000) actors.e.hp -= 0.1;
            } else {
                ctx.beginPath(); ctx.moveTo(0, -45); ctx.lineTo(-15, -25);
                ctx.moveTo(0, -45); ctx.lineTo(15, -25); ctx.stroke();
            }

            ctx.restore();
        }

        function loop() {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Floor
            ctx.fillStyle = "#111";
            ctx.fillRect(0, canvas.height - 70, canvas.width, 70);

            if (isPlaying) {
                // Movement
                if (inputs.left) { actors.p.vx = -7; actors.p.face = -1; }
                else if (inputs.right) { actors.p.vx = 7; actors.p.face = 1; }
                else actors.p.vx *= 0.8;
                
                if (inputs.up && actors.p.y >= canvas.height - 150) actors.p.vy = -15;
                if (inputs.charge) { actors.p.state = 'charge'; if (actors.p.ki < 100) actors.p.ki += 1; }
                else if (inputs.ult && actors.p.ki > 0) { actors.p.state = 'ult'; actors.p.ki -= 0.5; }
                else if (actors.p.state !== 'attack') actors.p.state = 'idle';

                actors.p.vy += 0.8;
                actors.p.x += actors.p.vx;
                actors.p.y += actors.p.vy;

                // Enemy AI
                if (actors.e.x > actors.p.x + 50) actors.e.x -= 2;
                else if (actors.e.x < actors.p.x - 50) actors.e.x += 2;

                // Bounds
                if (actors.p.y > canvas.height - 150) actors.p.y = canvas.height - 150;
                
                document.getElementById('p-hp').style.width = actors.p.hp + '%';
                document.getElementById('p-ki').style.width = actors.p.ki + '%';
                document.getElementById('e-hp').style.width = actors.e.hp + '%';

                drawStick(actors.p);
                drawStick(actors.e);
            }
            requestAnimationFrame(loop);
        }

        resize();
        loop();
    </script>
</body>
</html>
